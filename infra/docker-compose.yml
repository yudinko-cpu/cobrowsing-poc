# Prod-стек: self-hosted LiveKit + token-server + web-agent + Caddy.
#
# Образы backend и web-agent тянутся из GHCR (пушит GHA-workflow из .github/).
# Тег контролируется через IMAGE_TAG в infra/.env — GHA переписывает его на
# каждый деплой (git SHA), локальный `docker compose up` без явного тега
# берёт `latest`.
#
# ЗАПУСК на VPS:
#   cd /opt/cobrowsing/infra
#   cp .env.example .env       # один раз, заполнить домены/ключи/PUBLIC_IP
#   docker compose --env-file .env pull
#   docker compose --env-file .env up -d
#
# СЕТЬ:
#   - LiveKit — network_mode: host (обязательно для UDP media).
#   - Caddy — bridge, публикует 80/443 на хост, ходит к bridge-сервисам по
#     service name (backend, web-agent), к LiveKit — через host.docker.internal.
#   - Остальные — дефолтная bridge-сеть compose, общаются по service name.
#
# ПОРТЫ, СМОТРЯЩИЕ ВОВНЕ:
#   - Caddy: 80/tcp, 443/tcp
#   - LiveKit: 7881/tcp (TCP fallback), 50000-60000/udp (media)
#   Backend и Redis наружу НЕ выставлены (bridge network, доступ только через Caddy).

services:
  # LiveKit SFU — WebRTC media. Host mode обязателен.
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    network_mode: host
    command: --config /etc/livekit.yaml --node-ip ${PUBLIC_IP}
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      - redis

  # Redis — state для LiveKit и code→room mapping для backend.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      # LiveKit в host mode → к redis по 127.0.0.1:6379 на хосте
      # (livekit.yaml → redis.address). Backend (bridge) достучится по
      # service name `redis` без этого маппинга. Привязка только к loopback —
      # наружу не выставляется.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Token-server (JWT + session lifecycle). Образ из GHCR.
  backend:
    image: ghcr.io/${GHCR_OWNER}/cobrowsing-poc-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      # Локальный bind — не выставляется наружу, но позволяет curl'ить /health
      # с самого VPS (GHA smoke-check + ручная диагностика).
      - "127.0.0.1:4000:4000"
    environment:
      # server.js required-only — все переменные обязательны, дефолтов нет.
      PORT: 4000
      LIVEKIT_URL: wss://${DOMAIN}
      # backend ходит к LiveKit по HTTP (host mode), не через WSS-фронт Caddy —
      # экономим TLS-handshake и не зависим от того, поднялся ли уже Caddy.
      LIVEKIT_INTERNAL_URL: http://host.docker.internal:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: https://${AGENT_DOMAIN}
      LOG_LEVEL: info
    extra_hosts:
      # host.docker.internal → хост-машина. LiveKit слушает :7880 на хосте (host mode).
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Web-agent (Next.js SSR). Образ из GHCR.
  # NEXT_PUBLIC_API_URL зашит в бандл на build-time (см. web-agent/Dockerfile
  # и GHA build-args) — на рантайме передавать бессмысленно.
  web-agent:
    image: ghcr.io/${GHCR_OWNER}/cobrowsing-poc-web-agent:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - backend

  # Caddy — TLS termination + reverse proxy.
  # Bridge network: 80/443 наружу, до backend/web-agent — по service name,
  # до LiveKit (host mode) — через host.docker.internal:7880.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      AGENT_DOMAIN: ${AGENT_DOMAIN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
      - web-agent
      - livekit

volumes:
  redis-data:
  caddy-data:
  caddy-config:
