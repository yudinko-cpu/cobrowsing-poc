# LiveKit server config для self-hosted POC.
# Документация: https://docs.livekit.io/realtime/self-hosting/deployment/

port: 7880
bind_addresses:
  - ""

rtc:
  # TCP fallback на случай блокировки UDP корпоративными firewall.
  tcp_port: 7881
  # UDP range для WebRTC media. Должен быть открыт во внешнем firewall.
  port_range_start: 50000
  port_range_end: 60000
  # Использовать публичный IP сервера в SDP-офферах.
  # node-ip передаётся через CLI флаг в docker-compose.
  use_external_ip: true

redis:
  address: 127.0.0.1:6379

# API ключи для подписи JWT.
# Сгенерировать: openssl rand -hex 16 для key, openssl rand -base64 32 для secret.
# ВАЖНО: secret должен быть длиной не менее 32 символов.
keys:
  # Подставляется через envsubst при деплое (см. infra/README.md)
  # Для запуска без envsubst — заменить вручную.
  APIxxxxxxxxxxxx: secret_at_least_32_chars_replace_me_with_real_secret_please

# TURN — отключён для POC.
#
# ПОЧЕМУ: у нас SFU-архитектура (не P2P), сервер с публичным IP.
# UDP-медиа идёт клиент → LiveKit напрямую. Для клиентов, у которых UDP
# заблокирован, используется TCP fallback на порту 7881 (см. rtc.tcp_port выше).
# Этого хватает для ~95% сетей на первом деплое.
#
# КОГДА ВКЛЮЧАТЬ: если появятся клиенты в жёстких корпоративных сетях,
# где разрешён только TCP/443, или на CGNAT мобильных операторов, где
# ICE не устанавливает соединение вовсе.
#
# СИМПТОМЫ, ЧТО НУЖЕН TURN:
#   - Клиент застревает в state .connecting, не переходит в .streaming
#   - В логах LiveKit: "no compatible ICE candidates" или "ICE gathering timeout"
#   - Работает на Wi-Fi, не работает на LTE у конкретных операторов
#
# КАК ВКЛЮЧИТЬ ОБРАТНО:
#   1. Раскомментировать секцию ниже
#   2. Установить domain из .env (обычно тот же, что DOMAIN)
#   3. Открыть UDP 3478 и TCP 5349 в firewall (см. infra/README.md)
#   4. Смонтировать Let's Encrypt cert от Caddy в volume LiveKit
#      (или использовать external_tls: false для POC — TLS handshake будет
#      с self-signed, но многие клиенты это переваривают)
#
# turn:
#   enabled: true
#   domain: livekit.example.com   # = ${DOMAIN}
#   tls_port: 5349
#   udp_port: 3478
#   cert_file: /etc/letsencrypt/live/${DOMAIN}/fullchain.pem
#   key_file: /etc/letsencrypt/live/${DOMAIN}/privkey.pem
#   external_tls: false

# Логирование
logging:
  level: info
  json: false

# Лимиты на сессию (защита от runaway-клиентов).
# Можно тюнить под нагрузку.
room:
  empty_timeout: 300        # удалить пустую комнату через 5 мин
  max_participants: 5       # клиент + до 4 агентов
  enabled_codecs:
    - mime: video/H264      # H264 — лучшая совместимость с iOS hardware encoder
    - mime: video/VP8       # fallback
    - mime: audio/opus
