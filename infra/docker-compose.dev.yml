# Local dev stack — без Caddy, без TLS, всё на localhost.
#
# Отладка связки iOS Simulator ↔ backend ↔ LiveKit без публичного сервера.
# Продовская связка в docker-compose.yml с реальными доменами и Let's Encrypt.
#
# ─── Конфиг ──────────────────────────────────────────────────────────────────
# ВСЕ адреса и порты — в .env.dev (см. .env.dev.example). Меняешь порт или
# host для реального iPhone — правишь одну строку в .env.dev, compose
# подхватывает автоматически. Здесь только скелет с ${VAR} подстановкой.
#
# ─── Запуск ──────────────────────────────────────────────────────────────────
#   cd infra
#   cp .env.dev.example .env.dev
#   docker compose -f docker-compose.dev.yml up -d --build
#
# ─── Остановка ───────────────────────────────────────────────────────────────
#   docker compose -f docker-compose.dev.yml down

services:

  # LiveKit SFU в dev-режиме.
  #
  # network_mode: host — критично для WebRTC на Docker Desktop for Mac.
  # Без host mode UDP-порты проходят через Docker Desktop network proxy,
  # где WebRTC-трафик теряется. С host mode LiveKit слушает напрямую
  # на интерфейсах хоста. Требует Docker Desktop 4.29+ с включённым
  # "Enable host networking" в Settings → Resources → Network.
  # На Linux host networking работает всегда без opt-in.
  #
  # --node-ip НЕ указываем: в host mode LiveKit сам определяет свои
  # интерфейсы и отдаёт все IPv4-кандидаты. Это нужно, потому что iOS
  # Simulator (libwebrtc) НЕ отдаёт loopback как ICE-кандидат — он оффрит
  # только "внешние" интерфейсы (LAN, VPN, virtual). ICE должно найти
  # пересечение: LiveKit и Simulator видят один и тот же интерфейс хоста.
  #
  # Порты LIVEKIT_SIGNAL_PORT/LIVEKIT_TCP_PORT задаются в livekit.dev.yaml
  # (LiveKit читает свой конфиг сам). В .env.dev они дублируются для
  # документации и для того, чтобы token-server знал куда указать клиентам.
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    network_mode: host
    command: --config /etc/livekit.yaml
    # ports: игнорируются при network_mode: host — LiveKit слушает напрямую
    # на портах хоста согласно livekit.dev.yaml.
    volumes:
      - ./livekit.dev.yaml:/etc/livekit.yaml:ro
    depends_on:
      - redis

  # Redis — session state для LiveKit + code→room mapping для token-server.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-dev-data:/data
    command: redis-server --save 60 1 --loglevel warning

  # Token server. Тот же образ, что в проде, но с dev-настройками.
  # network_mode: host — слушает напрямую на TOKEN_SERVER_PORT хоста.
  #
  # Hot reload: bind-mount исходников + node --watch. Правки в server.js
  # применяются автоматически, docker compose build нужен только при
  # изменении package.json.
  token-server:
    build: ../backend
    restart: unless-stopped
    network_mode: host
    command: ["node", "--watch", "server.js"]
    # env_file подхватывается автоматически. Оттуда прилетают LIVEKIT_API_KEY,
    # LIVEKIT_API_SECRET — плюс всё, что не переопределено ниже.
    env_file:
      - .env.dev
    volumes:
      - ../backend:/app
      # Анонимный volume поверх /app/node_modules — иначе mount выше
      # затрёт node_modules из образа.
      - /app/node_modules
    environment:
      # PORT — на каком порту слушает сам server.js. Совпадает с тем,
      # что видят клиенты, потому что host mode.
      PORT: ${TOKEN_SERVER_PORT:-4000}
      # LIVEKIT_URL — то, что backend отдаёт iOS/браузеру в ответе.
      # HOST_IP из .env.dev: 127.0.0.1 для Simulator/браузера, LAN-IP
      # для реального iPhone.
      LIVEKIT_URL: ws://${HOST_IP:-127.0.0.1}:${LIVEKIT_SIGNAL_PORT:-7880}
      # LIVEKIT_INTERNAL_URL — куда backend сам ходит за RoomServiceClient.
      # Backend в контейнере, LiveKit доступен как host.docker.internal.
      LIVEKIT_INTERNAL_URL: http://host.docker.internal:${LIVEKIT_SIGNAL_PORT:-7880}
      REDIS_URL: redis://host.docker.internal:${REDIS_PORT:-6379}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - livekit

  # Next.js web-agent — dashboard оператора.
  #
  # Не host mode: web-agent'у не нужны host-интерфейсы, обычного port mapping
  # хватает. Браузер ходит на 127.0.0.1:${WEB_AGENT_PORT}, оттуда идут запросы
  # на HOST_IP:${TOKEN_SERVER_PORT} — это всё уровень браузера, контейнеру
  # знать про host-сеть не надо.
  #
  # Hot reload: bind-mount ../web-agent:/app + WATCHPACK_POLLING=true.
  # Polling нужен, потому что file events из macOS не всегда пробрасываются
  # через VirtioFS/gRPC-FUSE в контейнер — inotify внутри может не срабатывать
  # на изменения снаружи. Polling ест немного CPU, но для dev это норма.
  #
  # Анонимные volumes для /app/node_modules и /app/.next: без них bind-mount
  # затирает node_modules из image и билд-кэш Next.js при hot reload.
  web-agent:
    build:
      context: ../web-agent
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_AGENT_PORT:-3000}:3000"
    volumes:
      - ../web-agent:/app
      - /app/node_modules
      - /app/.next
    environment:
      # NEXT_PUBLIC_* инжектится Next.js в клиентский bundle на этапе старта.
      # HOST_IP — тот же, что и для LiveKit-URL: 127.0.0.1 для локального
      # браузера, LAN-IP если хочешь открыть дашборд с другого устройства.
      NEXT_PUBLIC_API_URL: http://${HOST_IP:-127.0.0.1}:${TOKEN_SERVER_PORT:-4000}
      # File watching: без polling'а hot reload на Docker Desktop for Mac
      # часто пропускает изменения (inotify не пробрасывается через FUSE).
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - token-server

volumes:
  redis-dev-data:
